{% extends "base.html" %}
{% block title %}<title>Chat - Uai Odontologia</title>{% endblock %}
{% block content %}
<div class="h-screen flex justify-center items-center bg-[#e5ddd5]">
<div class="w-full max-w-md bg-white rounded-lg shadow-xl overflow-hidden h-[90vh] flex flex-col">
    <div class="bg-[#075E54] p-4 text-white flex items-center gap-3">
        <a href="/" class="text-white hover:text-gray-200">← Voltar</a>
        <div>
            <span class="font-bold text-sm">Uai Odonto (Atendimento)</span>
            <span class="text-xs text-gray-200">Online</span>
        </div>
    </div>

    <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4">
        <div class="flex justify-start">
            <div class="bg-white p-3 rounded-tr-lg rounded-br-lg rounded-bl-lg shadow-sm max-w-[80%] text-sm">
                <p>Olá! Bem-vindo à Uai Odontologia. 👋<br>Sou o assistente virtual. Em que posso ajudar?</p>
            </div>
        </div>
    </div>

    <div class="bg-gray-100 p-3 flex items-center gap-2">
        <input type="text" id="user-input" placeholder="Digite sua mensagem..."
               class="flex-1 px-4 py-2 rounded-full border border-gray-300 focus:outline-none focus:border-[#075E54]"
               onkeypress="handleEnter(event)">
        <button onclick="sendMessage()" class="bg-[#128C7E] text-white p-2 rounded-full hover:bg-[#075E54] transition">➤</button>
    </div>
</div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const chatContainer = document.getElementById('chat-container');
let currentStep = 'greeting';

async function sendMessage() {
    const input = document.getElementById('user-input');
    const message = input.value.trim();
    if (!message) return;

    appendMessage(message, 'user');
    input.value = '';

    try {
        const response = await fetch('/api/chat/message', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                message: message,
                current_step: currentStep
            })
        });
        const data = await response.json();

        setTimeout(() => {
            appendMessage(data.response, 'bot');
            if (data.current_step) {
                currentStep = data.current_step;
            }
        }, 500);
    } catch (error) {
        console.error('Error:', error);
        appendMessage("Ops, algo deu errado. Tente novamente.", 'bot');
    }
}

function appendMessage(text, sender) {
    const div = document.createElement('div');
    div.className = sender === 'user' ? 'flex justify-end' : 'flex justify-start';

    const bubbleClass = sender === 'user'
        ? 'bg-[#dcf8c6] rounded-tl-lg rounded-tr-lg rounded-bl-lg'
        : 'bg-white rounded-tr-lg rounded-br-lg rounded-bl-lg';

    const time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

    div.innerHTML = `
        <div class="${bubbleClass} p-3 shadow-sm max-w-[80%] text-sm">
            <p>${text.replace(/\n/g, '<br>')}</p>
            <span class="text-[10px] text-gray-500 block text-right mt-1">${time}</span>
        </div>
    `;
    chatContainer.appendChild(div);
    chatContainer.scrollTop = chatContainer.scrollHeight;
}

function handleEnter(e) {
    if (e.key === 'Enter') sendMessage();
}
</script>
{% endblock %}
